services:
  - type: web
    name: langgraph-chatbot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run streamlit_rag_frontend.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: APP_DATA_DIR
        value: /opt/render/project/src/data
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: ALPHAVANTAGE_API_KEY
        sync: false
    disks:
      - name: app-data
        mountPath: /opt/render/project/src/data
        sizeGB: 1
